name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore kuka.keystore \
            -alias kukaalias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass kukakuka \
            -keypass kukakuka \
            -dname "CN=KUKA Mexico, OU=IT, O=KUKA, L=SLP, S=SLP, C=MX"

      - name: Find project root and build
        run: |
          PROJECT_DIR=$(find . -name "settings.gradle" -not -path "/build/" | head -1 | xargs -I{} dirname {})
          echo "Proyecto en: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          chmod +x gradlew
          curl -L "https://github.com/gradle/gradle/raw/v8.1.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          PROJECT_DIR=$(find . -name "settings.gradle" -not -path "/build/" | head -1 | xargs -I{} dirname {})
          APK_PATH="$PROJECT_DIR/app/build/outputs/apk/release/app-release-unsigned.apk"
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks kuka.keystore \
            --ks-key-alias kukaalias \
            --ks-pass pass:kukakuka \
            --key-pass pass:kukakuka \
            --out app-release-signed.apk \
            "$APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoCheckinKUKA-release
          path: app-release-signed.apk
          retention-days: 30
