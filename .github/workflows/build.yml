name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Find project root and build
        run: |
          # Buscar settings.gradle en cualquier subdirectorio
          PROJECT_DIR=$(find . -name "settings.gradle" -not -path "/build/" | head -1 | xargs dirname)
          echo "Proyecto encontrado en: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          chmod +x gradlew
          curl -L "https://github.com/gradle/gradle/raw/v8.1.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoCheckinKUKA-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
